name: CI/CD Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Frontend (Next.js)
  # ---------------------------------------------------------------------------
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: Install Dependencies
        run: npm ci
      - name: Build Next.js
        run: npm run build

  # ---------------------------------------------------------------------------
  # Backend (Python / FastAPI)
  # ---------------------------------------------------------------------------
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: './backend/requirements.txt'
      - name: Install Backend Deps
        run: pip install -r requirements.txt
      - name: Run Backend Tests
        run: python -m pytest -v

  # ---------------------------------------------------------------------------
  # Intelligence Agent (Python)
  # ---------------------------------------------------------------------------
  intelligence-agent-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Intelligence Agent Deps
        run: pip install -r intelligence_agent/requirements.txt pytest
      - name: Install Root Project
        run: pip install -e .
      - name: Run Intelligence Agent Tests
        run: pytest intelligence_agent/test/test_health_server.py -v

  # ---------------------------------------------------------------------------
  # Scrapers (Go)
  # ---------------------------------------------------------------------------
  scraper-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./scrapers
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: './scrapers/go.sum'
      - name: Build Go binaries
        run: go build -v ./...
      - name: Run Go tests
        run: go test -v ./...

  # ---------------------------------------------------------------------------
  # Runner (Rust)
  # ---------------------------------------------------------------------------
  runner-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./runner
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ./runner/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('runner/Cargo.lock') }}
      - name: Build Rust Runner
        run: cargo build --verbose
      - name: Run Rust Tests
        run: cargo test --verbose

  # ---------------------------------------------------------------------------
  # Ingestion (Scala / sbt)
  # ---------------------------------------------------------------------------
  ingestion-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ingestion
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup sbt
        uses: sbt/setup-sbt@v1
      - name: Cache sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
            ./ingestion/target
            ./ingestion/project/target
          key: ${{ runner.os }}-sbt-${{ hashFiles('ingestion/build.sbt', 'ingestion/project/plugins.sbt', 'ingestion/project/build.properties') }}
          restore-keys: |
            ${{ runner.os }}-sbt-
      - name: Compile Scala
        run: sbt compile
      - name: Run Scala Tests
        run: sbt test

  # ---------------------------------------------------------------------------
  # Docker Image Builds + Compose Validation
  # ---------------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci, intelligence-agent-ci, scraper-ci, runner-ci, ingestion-ci]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: shadow-network/backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build intelligence-agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: intelligence_agent/Dockerfile
          push: false
          tags: shadow-network/intelligence-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build scrapers image
        uses: docker/build-push-action@v6
        with:
          context: ./scrapers
          file: scrapers/Dockerfile
          push: false
          tags: shadow-network/scrapers:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ingestion image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ingestion/Dockerfile
          push: false
          tags: shadow-network/ingestion:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          tags: shadow-network/frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate production compose file
        run: |
          # Create a minimal .env for validation
          cat > /tmp/.env <<EOF
          MONGO_ROOT_USERNAME=admin
          MONGO_ROOT_PASSWORD=test
          NEO4J_PASSWORD=test
          EOF
          docker compose -f docker-compose.prod.yml --env-file /tmp/.env config --quiet
          echo "Production compose file validated successfully"
