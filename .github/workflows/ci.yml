name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  # ---------------------------------------------------------------------------
  # Frontend (Next.js)
  # ---------------------------------------------------------------------------
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: Install Dependencies
        run: npm ci
      - name: Build Next.js
        run: npm run build

  # ---------------------------------------------------------------------------
  # Backend (Python / FastAPI)
  # ---------------------------------------------------------------------------
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Backend Deps
        run: pip install -r backend/requirements.txt
      - name: Run Backend Tests
        run: |
          if [ -d "backend/tests" ]; then pytest backend/tests; else echo "No backend tests found."; fi

  # ---------------------------------------------------------------------------
  # Intelligence Agent (Python)
  # ---------------------------------------------------------------------------
  intelligence-agent-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Intelligence Agent Deps
        run: pip install -r intelligence_agent/requirements.txt
      - name: Install Root Project
        run: pip install -e .
      - name: Run Intelligence Agent Tests
        run: pytest intelligence_agent/test/test_health_server.py -v

  # ---------------------------------------------------------------------------
  # Scrapers (Go)
  # ---------------------------------------------------------------------------
  scraper-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./scrapers
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: './scrapers/go.sum'
      - name: Build Go binaries
        run: go build -v ./...
      - name: Run Go tests
        run: go test -v ./...

  # ---------------------------------------------------------------------------
  # Runner (Rust)
  # ---------------------------------------------------------------------------
  runner-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./runner
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ./runner/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('runner/Cargo.lock') }}
      - name: Build Rust Runner
        run: cargo build --verbose
      - name: Run Rust Tests
        run: cargo test --verbose

  # ---------------------------------------------------------------------------
  # Ingestion (Scala / sbt)
  # ---------------------------------------------------------------------------
  ingestion-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ingestion
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup sbt
        uses: sbt/setup-sbt@v1
      - name: Compile Scala
        run: sbt compile
      - name: Run Scala Tests
        run: sbt test
