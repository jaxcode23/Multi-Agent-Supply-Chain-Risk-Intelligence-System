# =============================================================================
#  Multi-Agent Supply Chain Risk Intelligence System
#  Production Docker Compose
#
#  Usage:
#    cp .env.example .env        # Configure production secrets
#    docker compose -f docker-compose.prod.yml up -d --build
#    docker compose -f docker-compose.prod.yml ps
#    docker compose -f docker-compose.prod.yml logs -f <svc>
#    docker compose -f docker-compose.prod.yml down
#
#  Only the frontend (port 3000) is exposed externally.
#  All other services communicate over the internal supply-chain-net bridge.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # MongoDB — Raw Intel Document Store
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: supply_chain_mongo
    restart: unless-stopped
    expose:
      - "27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME not set}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD not set}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-intelligence_db}
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - supply-chain-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  # ---------------------------------------------------------------------------
  # Neo4j — Supplier Knowledge Graph
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.19-community
    container_name: supply_chain_neo4j
    restart: unless-stopped
    expose:
      - "7474"
      - "7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD not set}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
      NEO4J_server_memory_pagecache_size: "512m"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    networks:
      - supply-chain-net
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:?NEO4J_PASSWORD not set}", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 2G

  # ---------------------------------------------------------------------------
  # ChromaDB — Vector Store for RAG Pipeline
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: supply_chain_chroma
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      ANONYMIZED_TELEMETRY: "false"
      ALLOW_RESET: "false"
      IS_PERSISTENT: "true"
      PERSIST_DIRECTORY: /chroma/chroma
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - supply-chain-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Go Scraping Gateway
  # ---------------------------------------------------------------------------
  scrapers:
    build:
      context: ./scrapers
      dockerfile: Dockerfile
    container_name: supply_chain_scrapers
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SCALA_HUB_ADDR: "ingestion:9090"
      HTTP_ADDR: "0.0.0.0:8080"
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      PAYLOAD_BUFFER_SIZE: ${PAYLOAD_BUFFER_SIZE:-200}
      SHUTDOWN_GRACE_SECONDS: ${SHUTDOWN_GRACE_SECONDS:-15}
      DIAL_TIMEOUT_SECONDS: ${DIAL_TIMEOUT_SECONDS:-10}
      SEND_TIMEOUT_SECONDS: ${SEND_TIMEOUT_SECONDS:-5}
      MAX_SEND_RETRIES: ${MAX_SEND_RETRIES:-3}
      SCRAPE_SEEDS: ${SCRAPE_SEEDS:-}
    networks:
      - supply-chain-net
    depends_on:
      ingestion:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Scala Ingestion Hub (gRPC + HTTP health)
  # ---------------------------------------------------------------------------
  ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    container_name: supply_chain_ingestion
    restart: unless-stopped
    expose:
      - "9090"
      - "9091"
    environment:
      GRPC_PORT: "9090"
      HEALTH_HTTP_PORT: "9091"
      CHROMA_HOST: "chromadb"
      CHROMA_API_KEY: ${CHROMA_API_KEY:-}
      CHROMA_TENANT: ${CHROMA_TENANT:-}
      CHROMA_DATABASE: ${CHROMA_DATABASE:-supply-chain-db}
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-supply_chain_intel}
      CHUNK_SIZE: ${CHUNK_SIZE:-1000}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-200}
      CHROMA_BATCH_SIZE: ${CHROMA_BATCH_SIZE:-10}
    networks:
      - supply-chain-net
    depends_on:
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Python Backend (API)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: supply_chain_backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      MONGO_URI: "mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/?authSource=admin"
      MONGO_DB_NAME: ${MONGO_DB_NAME:-intelligence_db}
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD not set}
      CHROMA_HOST: "chromadb"
      CHROMA_API_KEY: ${CHROMA_API_KEY:-}
      CHROMA_TENANT: ${CHROMA_TENANT:-}
      CHROMA_DATABASE: ${CHROMA_DATABASE:-supply-chain-db}
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-supply_chain_intel}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    networks:
      - supply-chain-net
    depends_on:
      mongodb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Intelligence Agent
  # ---------------------------------------------------------------------------
  intelligence-agent:
    build:
      context: .
      dockerfile: intelligence_agent/Dockerfile
    container_name: supply_chain_intelligence
    restart: unless-stopped
    expose:
      - "9100"
    environment:
      MONGO_URI: "mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/?authSource=admin"
      MONGO_DB_NAME: ${MONGO_DB_NAME:-intelligence_db}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      NEWS_API_URL: ${NEWS_API_URL:-https://newsapi.org/v2/everything}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      CHROMA_HOST: "chromadb"
      CHROMA_API_KEY: ${CHROMA_API_KEY:-}
      CHROMA_TENANT: ${CHROMA_TENANT:-}
      CHROMA_DATABASE: ${CHROMA_DATABASE:-supply-chain-db}
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-supply_chain_intel}
    networks:
      - supply-chain-net
    depends_on:
      mongodb:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # TypeScript Frontend (only externally exposed service)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_WS_URL: "ws://backend:8000/ws"
    container_name: supply_chain_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      BACKEND_URL: "http://backend:8000"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
    networks:
      - supply-chain-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

# =============================================================================
# Volumes — Persistent storage
# =============================================================================
volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_plugins:
    driver: local
  chroma_data:
    driver: local

# =============================================================================
# Networks — Internal bridge (only frontend port 3000 published)
# =============================================================================
networks:
  supply-chain-net:
    driver: bridge
    name: supply-chain-net
